name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  js-tests:
    name: JavaScript tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build browser bundles
        run: npm run build

      - name: Run test suite
        run: npm test

  python-package:
    name: Python package smoke test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Build widget bundle
        run: npm run bundle:anywidget

      - name: Install Python package and dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install anywidget traitlets
          python -m pip install -e .

      - name: Import widget package
        run: |
          python - <<'PY'
          from jscircuit_anywidget import JSCircuitWidget
          widget = JSCircuitWidget(height='620px', theme='auto')
          print(type(widget).__name__, widget.height, widget.theme, widget.element_count)
          PY
